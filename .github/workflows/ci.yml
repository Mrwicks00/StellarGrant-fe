name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  contracts:
    name: Contracts (Rust)
    runs-on: ubuntu-latest
    env:
      SOROBAN_SDK_BUILD_SYSTEM_SUPPORTS_SPEC_SHAKING_V2: "1"
    defaults:
      run:
        working-directory: stellargrant-contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Add WASM target
        run: rustup target add wasm32v1-none

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (WASM, lib only)
        run: cargo clippy --workspace --lib --target wasm32v1-none -- -D warnings

      - name: Check (WASM)
        run: cargo check --workspace --target wasm32v1-none

  api:
    name: API (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-working-directory: api

      - name: Install dependencies
        run: npm install

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Run Integration tests
        run: npm run test:integration

      - name: Run Coverage
        run: npm run test:coverage
